name: Cordex CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    outputs:
      app_version: ${{ steps.get_version.outputs.version }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Extract Version
      id: get_version
      run: |
        [xml]$csproj = Get-Content Cordex.csproj
        $version = $csproj.Project.PropertyGroup.Version
        echo "version=$version" >> $env:GITHUB_OUTPUT
      shell: powershell

    - name: Install .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Run tests
      run: dotnet test --configuration Release --no-build --verbosity normal
      continue-on-error: true

    - name: Publish
      run: dotnet publish Cordex.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=false -p:IncludeNativeLibrariesForSelfExtract=true -p:PublishTrimmed=false --output ./publish

    - name: Update App_version.json
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        $version = "${{ steps.get_version.outputs.version }}"
        $jsonPath = "docs/App_version.json"
        if (Test-Path $jsonPath) {
          $json = Get-Content -Path $jsonPath -Raw | ConvertFrom-Json
          if ($json.SupportedVersions -notcontains $version) {
            $json.SupportedVersions += $version
            $jsonString = ConvertTo-Json -InputObject $json -Depth 10
            [System.IO.File]::WriteAllText($jsonPath, $jsonString)
            
            # Configure git, commit and push changes
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add $jsonPath
            git commit -m "chore: update App_version.json to version $version [skip ci]"
            git push origin HEAD
          }
        }
      shell: powershell

    - name: Download WebView2 Runtime Bootstrapper
      run: |
        curl -L -o MicrosoftEdgeWebview2Setup.exe "https://go.microsoft.com/fwlink/?linkid=2124701"
      shell: cmd

    - name: Compile Inno Setup Script
      uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
      with:
        path: setup.iss
        options: /O+ /DMyAppVersion=${{ steps.get_version.outputs.version }}

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-installer
        path: ./Output/Cordex_Setup.exe
        retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts

    - name: Generate version tag
      id: tag_version
      run: |
        version="v${{ needs.build.outputs.app_version }}"
        echo "version=$version" >> $GITHUB_OUTPUT

    - name: Create Versioned Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag_version.outputs.version }}
        name: "Cordex ${{ steps.tag_version.outputs.version }}"
        token: ${{ secrets.GITHUB_TOKEN }}
        body: |
          ## Cordex Release ${{ steps.tag_version.outputs.version }}

          **Build Date:** ${{ github.event.head_commit.timestamp }}
          **Commit:** ${{ github.sha }}

          ### Changes
          ${{ github.event.head_commit.message }}

          ### Download
          | Platform | File |
          |---|---|
          | Windows | `Cordex_Setup.exe` |

          ### System Requirements
          - Windows 10 or later (x64)
          - No additional dependencies required (self-contained)
          - 4GB RAM minimum
        draft: false
        prerelease: false
        files: ./artifacts/windows-installer/Cordex_Setup.exe

    - name: Update Latest Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: "Latest Development Build"
        token: ${{ secrets.GITHUB_TOKEN }}
        body: |
          ## ⚡ Latest Cordex Build

          **Version:** ${{ steps.tag_version.outputs.version }}
          **Build Date:** ${{ github.event.head_commit.timestamp }}
          **Commit:** ${{ github.sha }}

          ### ⚠️ Note
          This is a development build. For stable releases, check the versioned releases.

          - **Windows:** `Cordex_Setup.exe`
        draft: false
        prerelease: true
        files: ./artifacts/windows-installer/Cordex_Setup.exe

    - name: Upload Combined Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Cordex-Installer-${{ steps.tag_version.outputs.version }}
        path: ./artifacts/windows-installer/Cordex_Setup.exe
        retention-days: 90
