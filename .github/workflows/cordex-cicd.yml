name: Cordex CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Run tests
      run: dotnet test --configuration Release --no-build --verbosity normal
      continue-on-error: true

    - name: Publish
      run: dotnet publish --configuration Release --runtime win-x64 --self-contained true -p:PublishTrimmed=false --output ./publish

    - name: Compile Inno Setup Script
      uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
      with:
        path: setup.iss
        options: /O+

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-installer
        path: ./Output/Cordex_Setup.exe
        retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts

    - name: Generate version tag
      id: tag_version
      run: |
        version="v1.1.${{ github.run_number }}"
        echo "version=$version" >> $GITHUB_OUTPUT

    - name: Create Versioned Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag_version.outputs.version }}
        name: "Cordex ${{ steps.tag_version.outputs.version }}"
        token: ${{ secrets.GITHUB_TOKEN }}
        body: |
          ## Cordex Release ${{ steps.tag_version.outputs.version }}

          **Build Date:** ${{ github.event.head_commit.timestamp }}
          **Commit:** ${{ github.sha }}

          ### Changes
          ${{ github.event.head_commit.message }}

          ### Download
          | Platform | File |
          |---|---|
          | Windows | `Cordex_Setup.exe` |

          ### System Requirements
          - Windows 10 or later (x64)
          - .NET 10 Runtime (self-contained, no install required)
          - 4GB RAM minimum
        draft: false
        prerelease: false
        files: ./artifacts/windows-installer/Cordex_Setup.exe

    - name: Update Latest Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: "Latest Development Build"
        token: ${{ secrets.GITHUB_TOKEN }}
        body: |
          ## ⚡ Latest Cordex Build

          **Version:** ${{ steps.tag_version.outputs.version }}
          **Build Date:** ${{ github.event.head_commit.timestamp }}
          **Commit:** ${{ github.sha }}

          ### ⚠️ Note
          This is a development build. For stable releases, check the versioned releases.

          - **Windows:** `Cordex_Setup.exe`
        draft: false
        prerelease: true
        files: ./artifacts/windows-installer/Cordex_Setup.exe

    - name: Upload Combined Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Cordex-Installer-${{ steps.tag_version.outputs.version }}
        path: ./artifacts/windows-installer/Cordex_Setup.exe
        retention-days: 90
